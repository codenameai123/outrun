name: Go Build Windows Binary

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.20'

    - name: Initialize Module and Fetch Dependencies
      run: |
        # 1. Clear out any old configuration files
        rm -f go.mod go.sum
        
        # 2. Set up the fresh tracking module
        go mod init github.com/fluofoxxo/outrun
        
        # 3. Explicitly pull down the 4 missing packages shown in your logs
        go get github.com/gorilla/mux@v1.8.1
        go get go.etcd.io/bbolt@v1.3.6
        go get github.com/shirou/gopsutil@v3.21.11+incompatible
        go get github.com/jinzhu/now@v1.1.5
        
        # 4. Pin low-level system settings to avoid Windows cross-compile bugs
        go get golang.org/x/sys@v0.1.0
        
        # 5. Tell Go to read your local folders for internal code paths
        echo "replace github.com/fluofoxxo/outrun => ./" >> go.mod
        
        # 6. Lock in and clean up the tracking file
        go mod tidy

    - name: Build Windows Executable
      env:
        GOOS: windows
        GOARCH: amd64
      run: go build -o outrun.exe main1.go

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: outrun-windows-server
        path: outrun.exe
